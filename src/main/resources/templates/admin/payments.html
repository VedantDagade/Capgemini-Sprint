<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Manage Payments')}"></head>
<body class="page-wrapper admin-layout">
    <th:block th:replace="~{fragments/navigation :: admin_sidebar}"></th:block>
    
    <div class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
            <h1 style="margin: 0;"><i class="fa-solid fa-file-invoice-dollar"></i> Payments</h1>
            <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> Record Payment</button>
        </div>
        
        <div class="card" style="margin-bottom: 2rem; background-color: var(--primary); color: white; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h3 style="color: var(--accent); margin-bottom: 0.5rem;">Total Revenue Collected</h3>
                <div style="font-size: 2.5rem; font-weight: 700;">$8,853,839.23</div>
            </div>
            <i class="fa-solid fa-vault fa-4x" style="opacity: 0.2;"></i>
        </div>
        
        <div class="card" style="padding: 0; overflow: hidden;">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Customer #</th>
                            <th>Customer Name</th>
                            <th>Check Number</th>
                            <th>Payment Date</th>
                            <th>Amount</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>103</td>
                            <td style="font-weight: 500;">Atelier graphique</td>
                            <td style="font-family: monospace; font-weight: 600; color: var(--primary);">HQ336336</td>
                            <td>2004-10-19</td>
                            <td style="font-weight: 600; color: var(--status-success);">$6,066.78</td>
                            <td>
                                <button class="btn btn-outline" style="padding: 0.25rem 0.5rem; font-size: 0.875rem;"><i class="fa-solid fa-pen"></i></button>
                                <button class="btn" style="background-color: var(--status-danger); color: white; padding: 0.25rem 0.5rem; font-size: 0.875rem;"><i class="fa-solid fa-trash"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td>112</td>
                            <td style="font-weight: 500;">Signal Gift Stores</td>
                            <td style="font-family: monospace; font-weight: 600; color: var(--primary);">JM555205</td>
                            <td>2003-06-05</td>
                            <td style="font-weight: 600; color: var(--status-success);">$14,571.44</td>
                            <td>
                                <button class="btn btn-outline" style="padding: 0.25rem 0.5rem; font-size: 0.875rem;"><i class="fa-solid fa-pen"></i></button>
                                <button class="btn" style="background-color: var(--status-danger); color: white; padding: 0.25rem 0.5rem; font-size: 0.875rem;"><i class="fa-solid fa-trash"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
