<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Register')}"></head>
<body style="background-color: var(--bg-main); padding: 2rem 0;">
    
    <div class="container" style="max-width: 800px;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a th:href="@{/}" style="display: inline-block;">
                <h1 style="font-size: 2rem; color: var(--primary);"><i class="fa-solid fa-car" style="color: var(--accent);"></i> ClassicModels</h1>
            </a>
            <p style="color: var(--text-muted);">Create a new customer account to start placing orders.</p>
        </div>

        <div class="card">
            <h2 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;"><i class="fa-solid fa-user-plus"></i> Customer Registration</h2>
            
            <form th:action="@{/login}" method="GET">
                
                <h4 style="margin-top: 1.5rem; margin-bottom: 1rem; color: var(--primary-light);">Company Information</h4>
                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">Customer Number (ID)</label>
                        <input type="number" class="form-control" placeholder="Auto-generated or custom" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Customer / Company Name</label>
                        <input type="text" class="form-control" placeholder="e.g. Atelier graphique" required>
                    </div>
                </div>

                <h4 style="margin-top: 1.5rem; margin-bottom: 1rem; color: var(--primary-light);">Contact Person</h4>
                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-control" placeholder="First Name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-control" placeholder="Last Name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone</label>
                        <input type="text" class="form-control" placeholder="(123) 456-7890" maxlength="20" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Credit Limit ($)</label>
                        <input type="number" step="0.01" class="form-control" placeholder="e.g. 50000.00">
                    </div>
                </div>

                <h4 style="margin-top: 1.5rem; margin-bottom: 1rem; color: var(--primary-light);">Address</h4>
                <div class="form-group">
                    <label class="form-label">Address Line 1</label>
                    <input type="text" class="form-control" placeholder="Street layout" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Address Line 2</label>
                    <input type="text" class="form-control" placeholder="Suite, Apt, etc (Optional)">
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">City</label>
                        <input type="text" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">State / Province</label>
                        <input type="text" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Postal Code</label>
                        <input type="text" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Country</label>
                        <input type="text" class="form-control" required>
                    </div>
                </div>

                <div style="margin-top: 2rem; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                    <a th:href="@{/login}" class="btn btn-outline">Cancel</a>
                    <button type="submit" class="btn btn-primary" style="padding: 0.75rem 2rem;"><i class="fa-solid fa-check"></i> Register Account</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
