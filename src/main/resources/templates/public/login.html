<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: var(--primary);">
    <div class="card" style="width: 100%; max-width: 450px; padding: 2.5rem; text-align: center; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);">
        
        <h1 style="font-size: 2rem; color: var(--primary); margin-bottom: 0.5rem;"><i class="fa-solid fa-car" style="color: var(--accent);"></i> ClassicModels</h1>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Sign in to your account</p>
        
        <!-- Toggle Switch Mock -->
        <div style="display: flex; margin-bottom: 2rem; background-color: #F3F4F6; border-radius: var(--radius-md); padding: 0.25rem;">
            <button style="flex: 1; padding: 0.5rem; border: none; background-color: white; border-radius: 4px; box-shadow: var(--shadow-sm); font-weight: 600; color: var(--primary);">Customer Login</button>
            <button style="flex: 1; padding: 0.5rem; border: none; background-color: transparent; border-radius: 4px; font-weight: 500; color: var(--text-muted);">Admin Login</button>
        </div>
        
        <!-- This form temporarily mocks routing until security is added -->
        <form th:action="@{/user/home}" method="GET" style="text-align: left;">
            <div class="form-group">
                <label class="form-label">Customer Number / Email</label>
                <input type="text" class="form-control" placeholder="e.g. 103" required>
            </div>
            <div class="form-group" style="margin-bottom: 2rem;">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem; font-size: 1rem;"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
        </form>
        
        <div style="margin-top: 1.5rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
            <p style="color: var(--text-muted); font-size: 0.875rem;">New Customer? <a th:href="@{/register}" style="font-weight: 600;">Register here</a></p>
            <p style="color: var(--text-muted); font-size: 0.875rem; margin-top: 0.5rem;">Return to <a th:href="@{/}" style="font-weight: 600;">Home Page</a></p>
        </div>
    </div>
</body>
</html>
