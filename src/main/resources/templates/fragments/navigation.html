<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

    <!-- ==================== USER NAVBAR FRAGMENT ==================== -->
    <nav th:fragment="user_navbar" class="navbar">
        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
            <div style="font-size: 1.25rem; font-weight: 700; color: var(--primary);">
                <i class="fa-solid fa-car"></i> ClassicModels
            </div>
            <div style="display: flex; gap: 1.5rem; align-items: center;">
                <a th:href="@{/user/home}"><i class="fa-solid fa-house"></i> Home</a>
                <a th:href="@{/user/categories}"><i class="fa-solid fa-list"></i> Categories</a>
                <a th:href="@{/user/orders}"><i class="fa-solid fa-box"></i> My Orders</a>
                <a th:href="@{/user/payments}"><i class="fa-solid fa-credit-card"></i> Payments</a>
                <a th:href="@{/}" class="btn btn-outline" style="padding: 0.25rem 0.75rem;"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
            </div>
        </div>
    </nav>

    <!-- ==================== ADMIN SIDEBAR FRAGMENT ==================== -->
    <aside th:fragment="admin_sidebar" class="sidebar" style="background: #1B263B; border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column;">
        <div style="padding: 2.5rem 2rem; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 2rem;">
            <div style="font-family: 'Newsreader', serif; font-size: 1.5rem; color: #ffffff; letter-spacing: -0.02em;">Admin</div>
        </div>
        <div style="display: flex; flex-direction: column; padding: 0 1.25rem; gap: 0.25rem; flex: 1;">
            <a th:href="@{/admin/dashboard}" class="admin-link"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
            <a th:href="@{/admin/offices}" class="admin-link"><i class="fa-solid fa-building"></i> Offices</a>
            <a th:href="@{/admin/employees}" class="admin-link"><i class="fa-solid fa-users-viewfinder"></i> Employees</a>
            <a th:href="@{/admin/customers}" class="admin-link active"><i class="fa-solid fa-handshake"></i> Customers</a>
            <a th:href="@{/admin/orders}" class="admin-link"><i class="fa-solid fa-boxes-stacked"></i> Orders</a>
            <a th:href="@{/admin/payments}" class="admin-link"><i class="fa-solid fa-file-invoice-dollar"></i> Payments</a>
            <a th:href="@{/admin/productlines}" class="admin-link"><i class="fa-solid fa-tags"></i> Product Lines</a>
            <a th:href="@{/admin/products}" class="admin-link"><i class="fa-solid fa-microchip"></i> Products</a>
        </div>
        
        <style>
            .admin-link {
                color: rgba(255,255,255,0.5);
                padding: 0.875rem 1rem;
                font-family: 'Manrope', sans-serif;
                font-size: 0.8125rem;
                font-weight: 500;
                letter-spacing: 0.04em;
                border-radius: 6px;
                display: flex;
                align-items: center;
                gap: 0.875rem;
                transition: all 0.2s;
            }
            .admin-link i { width: 1.25rem; font-size: 0.9375rem; opacity: 0.7; }
            .admin-link:hover {
                color: #ffffff;
                background: rgba(255,255,255,0.05);
            }
            .admin-link.active {
                color: #ffffff;
                background: rgba(255,255,255,0.08);
                font-weight: 600;
            }
        </style>

        <div style="padding: 2rem; border-top: 1px solid rgba(255,255,255,0.08);">
            <a th:href="@{/}" class="btn-logout"><i class="fa-solid fa-power-off"></i> Exit System</a>
        </div>
        <style>
            .btn-logout {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.5rem;
                padding: 0.75rem;
                border: 1px solid rgba(255,255,255,0.15);
                border-radius: 4px;
                color: rgba(255,255,255,0.6);
                font-size: 0.75rem;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                transition: all 0.2s;
            }
            .btn-logout:hover {
                background: rgba(255,255,255,0.05);
                color: #ffffff;
                border-color: rgba(255,255,255,0.3);
            }
        </style>
    </aside>

</body>
</html>
