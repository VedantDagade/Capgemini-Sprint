<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Place Order')}"></head>
<body class="page-wrapper">
    <div class="main-content" style="padding: 0; display: flex; flex-direction: column;">
        <th:block th:replace="~{fragments/navigation :: user_navbar}"></th:block>
        
        <div class="container" style="padding: 2rem 1.5rem; flex-grow: 1; max-width: 1000px;">
            
            <h1 style="margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;"><i class="fa-solid fa-file-invoice"></i> Create New Order</h1>
            
            <form th:action="@{/user/orders}" method="POST">
                <!-- Order Details Card -->
                <div class="card" style="margin-bottom: 2rem;">
                    <h2 style="margin-bottom: 1.5rem; color: var(--primary-light);">Order Information</h2>
                    
                    <div class="grid-3">
                        <div class="form-group">
                            <label class="form-label">Order Number</label>
                            <input type="number" class="form-control" placeholder="Auto-generated" disabled>
                            <small style="color: var(--text-muted);">Assigned on creation</small>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Order Date</label>
                            <input type="date" class="form-control" value="2026-04-14" readonly>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Required Date *</label>
                            <input type="date" class="form-control" required>
                        </div>
                    </div>
                    
                    <div class="form-group" style="margin-top: 1rem;">
                        <label class="form-label">Special Comments / Processing Notes</label>
                        <textarea class="form-control" rows="3" placeholder="Add any special requirements for shipping or handling..."></textarea>
                    </div>
                </div>
                
                <!-- Line Items Mock Table -->
                <div class="card" style="margin-bottom: 2rem; padding: 0; overflow: hidden;">
                    <div style="padding: 1.5rem; background-color: rgba(26,43,74,0.03); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
                        <h2 style="margin: 0; color: var(--primary-light);">Line Items</h2>
                        <a href="/user/categories" class="btn btn-outline" style="padding: 0.4rem 1rem; font-size: 0.875rem;"><i class="fa-solid fa-plus"></i> Browse Catalog</a>
                    </div>
                    
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Item Code</th>
                                    <th>Product Name</th>
                                    <th>Quantity</th>
                                    <th>Price Each</th>
                                    <th>Subtotal</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Mock Line Item from Product Detail transition -->
                                <tr>
                                    <td style="font-family: monospace; color: var(--primary); font-weight: 600;">S10_1949</td>
                                    <td>1952 Alpine Renault 1300</td>
                                    <td>
                                        <input type="number" class="form-control" value="10" style="width: 80px; padding: 0.25rem;">
                                    </td>
                                    <td>$98.58</td>
                                    <td style="font-weight: 600;">$985.80</td>
                                    <td><button type="button" class="btn" style="color: var(--status-danger); padding: 0.25rem;"><i class="fa-solid fa-trash"></i></button></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <!-- Total / Submission -->
                <div style="display: flex; justify-content: flex-end; align-items: flex-end; flex-direction: column;">
                    <div style="font-size: 1.25rem; margin-bottom: 0.5rem; color: var(--text-muted);">Estimated Total:</div>
                    <div style="font-size: 3rem; font-weight: 700; color: var(--primary); margin-bottom: 2rem;">$985.80</div>
                    
                    <div style="display: flex; gap: 1rem;">
                        <a href="/user/home" class="btn btn-outline" style="padding: 1rem 2rem;">Cancel</a>
                        <button type="button" onclick="window.location.href='/user/orders'" class="btn btn-primary" style="padding: 1rem 2rem; font-size: 1.1rem;"><i class="fa-solid fa-check-double"></i> Submit Order Officially</button>
                    </div>
                </div>
            </form>
            
        </div>
    </div>
</body>
</html>
